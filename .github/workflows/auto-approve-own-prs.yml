name: Auto-approve maintenance PRs

on:
  pull_request_target:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    if: >-
      github.event.pull_request.user.login == github.repository_owner &&
      startsWith(github.event.pull_request.head.ref, 'codex/')
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        run: gh pr review "${{ github.event.pull_request.html_url }}" --approve
        env:
          GH_TOKEN: ${{ github.token }}
