name: Auto-manage Dependabot PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  preflight:
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/')
    runs-on: ubuntu-latest
    outputs:
      eligible: ${{ steps.filter.outputs.eligible }}
    steps:
      - name: Check changed files
        id: filter
        uses: actions/github-script@v8
        with:
          script: |
            const allowedRootFiles = new Set([
              "pyproject.toml",
              "requirements.in",
              "requirements.txt",
              "requirements-dev.in",
              "requirements-dev.txt",
            ]);
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const eligible =
              files.length > 0 &&
              files.every(({ filename }) =>
                allowedRootFiles.has(filename) ||
                (filename.startsWith(".github/workflows/") &&
                  (filename.endsWith(".yml") || filename.endsWith(".yaml")))
              );
            core.setOutput("eligible", eligible ? "true" : "false");
            if (!eligible) {
              core.warning(
                `Dependabot PR not eligible for auto-management: ${files
                  .map(({ filename }) => filename)
                  .join(", ")}`
              );
            }

  auto-manage:
    needs: preflight
    if: needs.preflight.outputs.eligible == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        run: gh pr review "${{ github.event.pull_request.html_url }}" --approve
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Enable auto-merge
        run: gh pr merge "${{ github.event.pull_request.html_url }}" --auto --squash
        env:
          GH_TOKEN: ${{ github.token }}
